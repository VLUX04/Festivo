services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
      - ./database/populate.sql:/docker-entrypoint-initdb.d/03_populate.sql
      - ./database/populate.sql:/docker-entrypoint-initdb.d/04_triggers.sql
    healthcheck:
      test: [ "CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER:-myuser}" -d "$${POSTGRES_DB:-mydb}"' ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
  backend:
    build: ./backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: myuser
      DB_PASSWORD: secret
      DB_NAME: mydb
      PROD: true
    depends_on:
      - db

  frontend:
    hostname: frontend
    build: ./frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
